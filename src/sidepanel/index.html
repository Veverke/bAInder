<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bAInder - AI Chat Organizer</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header Section -->
    <header class="header">
      <div class="header-content">
        <h1>
          <span class="logo">📖</span>
          <span class="title">bAInder</span>
        </h1>
        <button id="addTopicBtn" class="btn-primary" title="Add Topic">
          <span>➕</span>
          <span>Add Topic</span>
        </button>
      </div>
      
      <!-- Search Bar -->
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="searchInput" 
          class="search-input" 
          placeholder="Search chats and topics..."
        >
        <button id="clearSearchBtn" class="btn-clear" title="Clear search" style="display: none;">✕</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Table of Contents Section -->
      <section class="toc-section">
        <div class="section-header">
          <h2>📖 Table of Contents</h2>
          <span id="itemCount" class="item-count">0 topics</span>
        </div>

        <!-- Tree View Container -->
        <div id="treeView" class="tree-view">
          <!-- Welcome message when empty -->
          <div id="emptyState" class="empty-state">
            <div class="empty-icon">📚</div>
            <h3>No topics yet</h3>
            <p>Start organizing your AI chats by creating your first topic.</p>
            <button class="btn-secondary" onclick="document.getElementById('addTopicBtn').click()">
              Create First Topic
            </button>
          </div>
        </div>
      </section>

      <!-- Search Results Section (hidden by default) -->
      <section id="searchResults" class="search-results" style="display: none;">
        <div class="section-header">
          <h2>🔍 Search Results</h2>
          <span id="resultCount" class="item-count">0 results</span>
        </div>
        <div id="searchResultsList" class="results-list">
          <!-- Search results will be populated here -->
        </div>
      </section>
    </main>

    <!-- Footer Section -->
    <footer class="footer">
      <div class="storage-info">
        <span class="storage-icon">💾</span>
        <span id="storageUsage">Storage: Loading...</span>
      </div>
      <button id="settingsBtn" class="btn-icon" title="Settings">⚙️</button>
    </footer>
  </div>

  <!-- Context Menu (hidden by default) -->
  <div id="contextMenu" class="context-menu" style="display: none;">
    <div class="context-menu-item" data-action="rename">
      <span class="icon">✏️</span>
      <span>Rename</span>
    </div>
    <div class="context-menu-item" data-action="move">
      <span class="icon">📁</span>
      <span>Move to...</span>
    </div>
    <div class="context-menu-item" data-action="merge">
      <span class="icon">🔗</span>
      <span>Merge with...</span>
    </div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" data-action="export">
      <span class="icon">💾</span>
      <span>Export...</span>
    </div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item danger" data-action="delete">
      <span class="icon">🗑️</span>
      <span>Delete</span>
    </div>
  </div>

  <!-- Modal Container (for dialogs) -->
  <div id="modalContainer" class="modal-container" style="display: none;">
    <!-- Modals will be dynamically inserted here -->
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
