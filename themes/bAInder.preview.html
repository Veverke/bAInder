<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bAInder Preview</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg-primary, #ffffff);
      color: var(--text-primary, #0f172a);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .pv-header {
      background: var(--header-bg, #f8fafc);
      border-bottom: 1px solid var(--border-primary, #e2e8f0);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .pv-header__brand {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--header-accent, var(--primary, #6366f1));
      letter-spacing: -0.02em;
    }
    .pv-header__actions { display: flex; gap: 4px; }
    .pv-icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 0.875rem;
      color: var(--text-secondary, #475569);
    }
    .pv-icon-btn:hover { background: var(--bg-hover, #f1f5f9); }

    /* ── Search ── */
    .pv-search {
      margin: 10px 10px 6px;
      background: var(--bg-secondary, #f8fafc);
      border: 1px solid var(--border-primary, #e2e8f0);
      border-radius: 8px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }
    .pv-search__icon { font-size: 0.75rem; opacity: 0.5; }
    .pv-search__placeholder { font-size: 0.75rem; color: var(--text-tertiary, #94a3b8); }

    /* ── Topic tree ── */
    .pv-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
    .pv-topic { border-bottom: 1px solid var(--border-primary, #e2e8f0); }
    .pv-topic__header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-primary, #0f172a);
    }
    .pv-topic__header:hover { background: var(--bg-hover, #f1f5f9); }
    .pv-topic__arrow { font-size: 0.5625rem; color: var(--text-tertiary, #94a3b8); width: 12px; }
    .pv-topic__label { flex: 1; font-size: 0.8125rem; font-weight: 600; }
    .pv-count {
      font-size: 0.6875rem;
      color: var(--text-tertiary, #94a3b8);
      background: var(--bg-tertiary, #f1f5f9);
      padding: 1px 6px;
      border-radius: 10px;
    }

    /* ── Chat rows ── */
    .pv-chat {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px 5px 24px;
      border-left: 3px solid transparent;
      font-size: 0.75rem;
      color: var(--text-secondary, #475569);
    }
    .pv-chat--chatgpt { border-left-color: #10a37f; }
    .pv-chat--claude  { border-left-color: #d97757; }
    .pv-chat:hover { background: var(--bg-hover, #f1f5f9); }
    .pv-chip {
      font-size: 0.5625rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .pv-chip--chatgpt { background: rgba(16,163,127,0.12); color: #10a37f; }
    .pv-chip--claude  { background: rgba(217,119,87,0.12);  color: #d97757; }
    .pv-chat__title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Footer ── */
    .pv-footer {
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border-primary, #e2e8f0);
      flex-shrink: 0;
      background: var(--bg-elevated, #ffffff);
    }
    .pv-btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .pv-btn--primary  { background: var(--primary, #6366f1); color: var(--text-inverse, #fff); }
    .pv-btn--secondary {
      background: var(--bg-secondary, #f8fafc);
      color: var(--text-primary, #0f172a);
      border: 1px solid var(--border-primary, #e2e8f0);
    }
    .pv-btn:hover { opacity: 0.85; }

    /* ── Status bar ── */
    .pv-status {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: var(--bg-secondary, #f8fafc);
      border-top: 1px solid var(--border-primary, #e2e8f0);
      flex-shrink: 0;
    }
    .pv-badge { font-size: 0.625rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
    .pv-badge--success { background: var(--success-bg, #d1fae5); color: var(--success, #10b981); }
    .pv-badge--danger  { background: var(--danger-bg,  #fee2e2); color: var(--danger,  #ef4444); }
    .pv-badge--info    { background: var(--info-bg,    #dbeafe); color: var(--info,    #3b82f6); }

    /* ── Scrollbar ── */
    .pv-tree::-webkit-scrollbar { width: 4px; }
    .pv-tree::-webkit-scrollbar-track { background: transparent; }
    .pv-tree::-webkit-scrollbar-thumb {
      background: var(--border-secondary, #cbd5e1);
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="pv-header">
    <div class="pv-header__brand">
      <span>📖</span>
      <span>bAInder</span>
    </div>
    <div class="pv-header__actions">
      <button class="pv-icon-btn" title="Search">🔍</button>
      <button class="pv-icon-btn" title="Settings">⚙️</button>
    </div>
  </div>

  <div class="pv-search">
    <span class="pv-search__icon">🔍</span>
    <span class="pv-search__placeholder">Search topics &amp; chats…</span>
  </div>

  <div class="pv-tree">

    <div class="pv-topic">
      <div class="pv-topic__header">
        <span class="pv-topic__arrow">▼</span>
        <span class="pv-topic__label">Work</span>
        <span class="pv-count">2</span>
      </div>
      <div class="pv-chat pv-chat--chatgpt">
        <span class="pv-chip pv-chip--chatgpt">GPT</span>
        <span class="pv-chat__title">Design system discussion</span>
      </div>
      <div class="pv-chat pv-chat--claude">
        <span class="pv-chip pv-chip--claude">Claude</span>
        <span class="pv-chat__title">Code review session</span>
      </div>
    </div>

    <div class="pv-topic">
      <div class="pv-topic__header">
        <span class="pv-topic__arrow">▶</span>
        <span class="pv-topic__label">Personal</span>
        <span class="pv-count">1</span>
      </div>
    </div>

    <div class="pv-topic">
      <div class="pv-topic__header">
        <span class="pv-topic__arrow">▶</span>
        <span class="pv-topic__label">Research</span>
        <span class="pv-count">3</span>
      </div>
    </div>

  </div>

  <div class="pv-footer">
    <button class="pv-btn pv-btn--primary">+ Add Topic</button>
    <button class="pv-btn pv-btn--secondary">Export</button>
  </div>

  <div class="pv-status">
    <span class="pv-badge pv-badge--success">✓ Saved</span>
    <span class="pv-badge pv-badge--danger">⚠ Error sample</span>
    <span class="pv-badge pv-badge--info">ℹ Info</span>
  </div>

</body>
</html>
